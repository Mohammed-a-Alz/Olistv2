version: 2

models:
  - name: stg_olist__customers
    description: "Cleaned and renamed customers from Olist raw data. One row per customer."
    columns:
      - name: customer_id
        description: "Primary key. Unique identifier for each customer."
        tests:
          - not_null
          - unique

      - name: customer_unique_id
        description: "Unique identifier for the customer across multiple orders."
        tests:
          - not_null

      - name: zip_code
        description: "Customer zip code prefix."
        tests:
          - not_null

      - name: city
        description: "Customer city."

      - name: state
        description: "Customer state code."