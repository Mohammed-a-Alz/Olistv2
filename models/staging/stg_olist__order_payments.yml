version: 2

models:
  - name: stg_olist__order_payments
    description: "Cleaned payment data from Olist. One row per payment per order."
    columns:
      - name: order_id
        description: "Foreign key to stg_olist__orders."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_olist__orders')
                field: order_id

      - name: payment_sequence
        description: "Sequential payment number for orders with multiple payments."
        tests:
          - not_null

      - name: payment_type
        description: "Payment method used. not_defined indicates unknown payment type in source."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['credit_card', 'boleto', 'voucher', 'debit_card']

      - name: installments
        description: "Number of installments."
        tests:
          - not_null

      - name: payment_amount_brl
        description: "Payment amount in Brazilian Real."
        tests:
          - not_null

      - name: is_credit_card
        description: "True if payment was made by credit card."
        tests:
          - not_null

      - name: is_installment
        description: "True if payment was made in more than one installment."
        tests:
          - not_null