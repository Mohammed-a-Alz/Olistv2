version: 2

models:
  - name: stg_olist__geolocation
    description: "Cleaned geolocation data mapping zip codes to coordinates."
    columns:
      - name: zip_code
        description: "Zip code prefix."
        tests:
          - not_null

      - name: latitude
        description: "Latitude coordinate."
        tests:
          - not_null

      - name: longitude
        description: "Longitude coordinate."
        tests:
          - not_null

      - name: city
        description: "City name."

      - name: state
        description: "State code."