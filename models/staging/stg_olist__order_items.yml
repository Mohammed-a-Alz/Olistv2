version: 2

models:
  - name: stg_olist__order_items
    description: "Cleaned order items from Olist. One row per item per order."
    columns:
      - name: order_id
        description: "Foreign key to stg_olist__orders."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_olist__orders')
                field: order_id

      - name: item_id
        description: "Sequential item number within an order."
        tests:
          - not_null

      - name: product_id
        description: "Foreign key to stg_olist__products."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_olist__products')
                field: product_id

      - name: seller_id
        description: "Foreign key to stg_olist__sellers."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_olist__sellers')
                field: seller_id

      - name: ship_by_at
        description: "Shipping deadline timestamp."

      - name: price_brl
        description: "Item price in Brazilian Real."
        tests:
          - not_null

      - name: freight_brl
        description: "Freight value in Brazilian Real."
        tests:
          - not_null

      - name: total_amount_brl
        description: "Total amount including price and freight in Brazilian Real."
        tests:
          - not_null