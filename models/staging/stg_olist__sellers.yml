version: 2

models:
  - name: stg_olist__sellers
    description: "Cleaned seller data from Olist. One row per seller."
    columns:
      - name: seller_id
        description: "Primary key. Unique identifier for each seller."
        tests:
          - not_null
          - unique

      - name: zip_code
        description: "Seller zip code prefix."
        tests:
          - not_null

      - name: city
        description: "Seller city."

      - name: state
        description: "Seller state code."